{% extends "layout.html" %}

{% block content %}
    <section class="error-section">
        <div class="section-container">
            <div class="error-container">
                <div class="error-code">{{ error_code }}</div>
                <h1>Упс! Щось трапилось 😞</h1>
                <p class="error-message">{{ error_message }}</p>
                
                <div class="error-actions">
                    <a href="{{ url_for('index') }}" class="btn btn-primary">Повернутись на головну</a>
                    <a href="{{ url_for('catalog') }}" class="btn btn-secondary">Перейти до каталогу</a>
                </div>
            </div>
        </div>
    </section>
{% endblock %}
